# Base configuration — MLP defaults (all models inherit from this)

pipeline:
  phases: [tune, benchmark]
  force_retune: true

build:
  c_cpu: true
  c_cuda: true
  rust_cpu: true
  rust_cublas: true
  rust_kernels: true
  python_numpy: true
  python_pytorch_cpu: true
  python_pytorch_cuda: true

training:
  epochs: 500
  learning_rate: 0.03
  batch_size: 8192
  hidden_size: 128
  optimizer: sgd
  scheduler: null
  warmup_fraction: 0.05
  lr_min: 1.0e-6
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

tuning:
  enabled: true
  tune_epochs: 50
  sweep_epochs: 5              # epochs for Phase 1 throughput sweep
  acc_tolerance: 1.0           # pick highest-throughput config within this % of peak accuracy
  throughput_tolerance: 0.05   # pick largest batch_size within 5% of peak throughput
  batch_sizes: [1024, 2048, 4096, 8192, 16384]
  sgd_lr_range: [0.01, 0.02, 0.05, 0.1, 0.2, 0.5]
  adam_lr_range: [0.0001, 0.0005, 0.001, 0.005, 0.01]

benchmark:
  mode: standard
  datasets: [generated, iris, breast-cancer]
  runs: 3
  unified: true
  min_samples: 3

scaling:
  epochs: 200
  fixed_batch_size: 8192
  fixed_num_samples: 262144
  dataset_sizes: [8192, 16384, 32768, 65536, 131072, 262144, 524288, 1048576, 2097152, 4194304]
  batch_sizes: [256, 512, 1024, 2048, 4096, 8192, 16384, 32768]
  hidden_sizes: [64, 128, 256, 512, 1024, 2048, 4096]

plotting:
  dpi: 150
  title_prefix: true
  output_dir: results/plots
