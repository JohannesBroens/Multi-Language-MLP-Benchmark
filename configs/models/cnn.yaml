# CNN model config — overrides base.yaml defaults for LeNet-5 on MNIST

training:
  epochs: 200
  learning_rate: 0.32
  batch_size: 4096

benchmark:
  datasets: [mnist]

scaling:
  batch_sizes: [16, 32, 64, 128, 256, 512, 1024]

tuning:
  batch_sizes: [32, 64, 128, 256, 512, 1024]
  sgd_lr_range: [0.01, 0.05, 0.1, 0.2, 0.5, 1.0]
  adam_lr_range: [0.0005, 0.001, 0.005, 0.01, 0.05]
